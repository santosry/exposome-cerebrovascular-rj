# .github/workflows/ci.yml -- Continuous Integration
# =============================================================================
# Lightweight CI: validates code integrity without heavy R package installation.
# test_runner.R sources real R/ functions and runs self-contained checks.
# The modules job verifies all 8 R modules parse without syntax errors.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -- Self-contained validation (no package installs needed) --
  test:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run self-contained validation
        run: |
          Rscript -e "install.packages(c('stringr','stringi'), repos='https://cloud.r-project.org', quiet=TRUE)"
          Rscript tests/test_runner.R

  # -- Repository Size Check --
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repository size
        run: |
          REPO_SIZE=$(du -sm . | cut -f1)
          echo "Repository size: ${REPO_SIZE} MB"
          LARGE=$(find . -type f -size +100M 2>/dev/null | head -5)
          if [ -n "$LARGE" ]; then
            echo "NOTE: Files > 100 MB found (raw data fallback):"
            echo "$LARGE"
            echo "These are pipeline fallback files; allowed for reproducibility."
          fi
          echo "Size check complete"

  # -- FAIR Compliance --
  fair-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required FAIR files
        run: |
          REQUIRED=("README.md" "CITATION.cff" "LICENSE" "docs/formulas/model_formulas.md" "docs/methodology/analysis_overview.md" "REPRODUCIBILITY_CHECKLIST.md" ".gitignore" "docker/Dockerfile" "config/config.R")
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            echo "FAIR check FAILED"
            exit 1
          fi
          if grep -q '0000-0000-0000-0000' CITATION.cff; then
            echo "WARNING: Placeholder ORCIDs detected in CITATION.cff"
          else
            echo "ORCID check passed"
          fi
          echo "FAIR check passed"

  # -- Module load test --
  modules:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest
    steps:
      - uses: actions/checkout@v4
      - name: Test all 8 modules load without syntax error
        run: |
          Rscript -e "
          options(warn=1)
          source('config/config.R', local=TRUE)
          modules <- c('utils','download','exposure_processing','preprocessing',
                       'dlnm_models','bayesian_models','visualization','reporting')
          for (f in modules) {
            cat('Loading', f, '... ')
            source(file.path('R', paste0(f, '.R')), local=TRUE)
            cat('OK\n')
          }
          cat('All', length(modules), 'modules loaded successfully\n')
          "

  # -- Minimal DLNM smoke test --
  smoke-test:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install core dependencies and run minimal DLNM
        run: |
          Rscript -e "
          options(warn=1)
          install.packages(c('dlnm','splines','MASS','sandwich','lmtest','dplyr','tidyr','tibble','stringr','stringi'), repos='https://cloud.r-project.org', quiet=TRUE)
          source('config/config.R', local=TRUE)
          source('R/utils.R', local=TRUE)
          source('R/dlnm_models.R', local=TRUE)

          # Minimal synthetic data
          set.seed(42)
          n <- 365
          dat <- data.frame(
            data = seq.Date(as.Date('2020-01-01'), by='day', length.out=n),
            macro_regiao = 'Test',
            internacoes_i60_i69 = rpois(n, 5),
            temp_med = 20 + 10*sin(2*pi*(1:n)/365) + rnorm(n, 0, 1),
            ur_med = 60 + rnorm(n, 0, 3),
            ano = 2020, mes = rep(1:12, length.out=n),
            dow = rep(1:7, length.out=n),
            feriado = FALSE, pandemia = FALSE,
            offset_log_populacao = log(100000),
            tempo = as.numeric(1:n)/365.25,
            pm25_mensal = runif(n, 10, 25),
            influenza_lag7 = rpois(n, 1)
          )

          cat('Fitting DLNM with PM2.5...\n')
          obj <- fit_one_dlnm(dat, 'internacoes_i60_i69', 'temp_med',
                              df_exp=4, df_lag=3, lag_max=14, use_mmt=TRUE)

          cat(sprintf('Family: %s\n', obj\$family))
          cat(sprintf('p_association: %.4f\n', obj\$p_association))
          cat(sprintf('p_method: %s\n', obj\$p_method))
          cat(sprintf('RR cumulative: %.3f\n', obj\$pred\$allRRfit[length(obj\$pred\$allRRfit)]))
          cat(sprintf('MMT: %.1f (percentil %.0f)\n', obj\$cen_mmt, obj\$cen_percentil_mmt))
          cat(sprintf('Converged: %s\n', !isTRUE(obj\$alerta_convergencia)))

          if (!isTRUE(obj\$alerta_convergencia) && obj\$p_association > 0 && obj\$p_association < 1) {
            cat('SMOKE TEST PASSED\n')
          } else {
            cat('SMOKE TEST WARNING\n')
          }
          "
