# .github/workflows/ci.yml -- Continuous Integration
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -- Validation checks (self-contained, no dependencies) --
  test:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run validation
        run: Rscript tests/test_runner.R

  # -- Repository Size Check --
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no file exceeds 50 MB
        run: |
          LARGE=$(find . -type f -size +50M 2>/dev/null)
          if [ -n "$LARGE" ]; then
            echo "ERROR: Files > 50 MB found: $LARGE"
            exit 1
          fi
          echo "Size check passed"

  # -- FAIR Compliance --
  fair-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          for f in README.md CITATION.cff LICENSE docs/formulas/model_formulas.md docs/methodology/analysis_overview.md REPRODUCIBILITY_CHECKLIST.md .gitignore docker/Dockerfile config/config.R; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "FAIR check passed"

  # -- Module load test --
  modules:
    runs-on: ubuntu-latest
    container: rocker/geospatial:latest
    needs: [test, size-check]
    steps:
      - uses: actions/checkout@v4
      - name: Test all modules source without error
        run: |
          Rscript -e "
          options(warn=1)
          source('config/config.R', local=TRUE)
          for (f in c('utils','download','exposure_processing','preprocessing',
                       'dlnm_models','bayesian_models','visualization','reporting')) {
            source(file.path('R', paste0(f, '.R')), local=TRUE)
          }
          cat('All 8 modules loaded successfully\n')
          "
