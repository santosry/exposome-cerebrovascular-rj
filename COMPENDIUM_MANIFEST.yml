# Research Compendium Manifest — DLNM Cerebrovascular RJ (2010–2025)
# =============================================================================
# This file maps every deliverable in the compendium.
# Based on: Research Compendium specification (https://research-compendium.science)

compendium:
  title: "Climate Exposure and Cerebrovascular Outcomes in Rio de Janeiro (2010–2025)"
  subtitle: "A Reproducible DLNM-Bayesian Framework Using INMET, DATASUS and SIDRA"
  version: "1.0.0"
  date_created: "2026-06-19"
  seed: 20260619
  license: "MIT"
  language: "R 4.6.0"

authors:
  - name: "Ryan de Paulo Santos"
    email: "ryan.paulo@gsuite.iff.edu.br"
    orcid: ""
  - name: "Camila Henriques Nunes"
    email: "camila.n@gsuite.iff.edu.br"
    orcid: ""
  - name: "Karla Rangel Ribeiro"
    email: "karla.ribeiro@gsuite.iff.edu.br"
    orcid: ""
  - name: "Enrique Medina-Acosta"
    email: "quique@uenf.br"
    orcid: ""

files:
  # ── Configuration ──
  - path: "config/config.R"
    role: "master-configuration"
    description: "All tunable parameters, paths, and constants"

  # ── Source code ──
  - path: "R/utils.R"
    role: "source-code"
    description: "Logging, encoding checks, safe evaluation, geography utilities"

  - path: "R/download.R"
    role: "source-code"
    description: "Data acquisition from DATASUS, INMET, IBGE/SIDRA"

  - path: "R/exposure_processing.R"
    role: "source-code"
    description: "INMET station processing, spatial mapping, centroids"

  - path: "R/preprocessing.R"
    role: "source-code"
    description: "SIH/SIM cleaning, outcome processing, analytic dataset assembly"

  - path: "R/dlnm_models.R"
    role: "source-code"
    description: "DLNM fitting, cross-prediction, AUC, sensitivity, diagnostics"

  - path: "R/bayesian_models.R"
    role: "source-code"
    description: "Hierarchical Bayesian stabilization, prior sensitivity"

  - path: "R/visualization.R"
    role: "source-code"
    description: "Exposure-response plots, 3D surfaces, CellPress figures"

  - path: "R/reporting.R"
    role: "source-code"
    description: "Report generation, benchmark validation, manuscript rendering"

  # ── Entry points ──
  - path: "run_pipeline.R"
    role: "entry-point"
    description: "Master pipeline orchestrator"

  - path: "_targets.R"
    role: "entry-point"
    description: "Modern reproducible pipeline with intelligent caching"

  - path: "Makefile"
    role: "entry-point"
    description: "Automated workflow with make targets"

  # ── Containerization ──
  - path: "docker/Dockerfile"
    role: "container"
    description: "Reproducible computational environment"

  - path: "docker/docker-compose.yml"
    role: "container"
    description: "Multi-service orchestration"

  # ── CI/CD ──
  - path: ".github/workflows/ci.yml"
    role: "ci-cd"
    description: "Continuous integration: lint, test, build, reproducibility check"

  # ── Documentation ──
  - path: "README.md"
    role: "documentation"
    description: "Project overview and quick start guide"

  - path: "CITATION.cff"
    role: "metadata"
    description: "Citation metadata (CFF format)"

  - path: "LICENSE"
    role: "metadata"
    description: "MIT License"

  - path: "REPRODUCIBILITY_CHECKLIST.md"
    role: "documentation"
    description: "Reproducibility checklist"

  - path: "docs/formulas/model_formulas.md"
    role: "documentation"
    description: "DLNM model specification and formulas"

  - path: "docs/methodology/analysis_overview.md"
    role: "documentation"
    description: "Methodological overview of the analytical framework"

  - path: "docs/methodology/pm25_granularity_note.md"
    role: "documentation"
    description: "PM2.5 monthly granularity justification and seasonal profile documentation"

  - path: "docs/methodology/scientific_audit_response.md"
    role: "documentation"
    description: "Repository-level response to scientific audit with PM2.5 monthly upgrade details"

  - path: "config/README.md"
    role: "documentation"
    description: "Configuration guide"

  - path: "docs/data_sources/station_coverage.md"
    role: "documentation"
    description: "Complete catalog of 26 INMET stations and 92 PM2.5 municipalities with codes, operation dates, and imputation methods"

  - path: "audit/air_quality/auditoria_mp25_cobertura_municipal.csv"
    role: "audit"
    description: "Municipal PM2.5 coverage audit: direct monitoring versus nearest-neighbor assignment"

  - path: "audit/air_quality/auditoria_granularidade_exposicoes_clima_pm25.csv"
    role: "audit"
    description: "Temporal/spatial granularity comparison between daily INMET climate exposures and annual PM2.5"

  - path: "audit/air_quality/auditoria_decisao_metodologica_pm25_github.csv"
    role: "audit"
    description: "Methodological decision log for PM2.5 use in the public GitHub compendium"

  # ── FAIR metadata ──
  - path: "metadata/data_dictionary.csv"
    role: "metadata"
    description: "FAIR data dictionary"

  - path: "metadata/data_lineage.csv"
    role: "metadata"
    description: "Data provenance and lineage"

  - path: "metadata/outputs_manifest.csv"
    role: "metadata"
    description: "Complete inventory of outputs"

  # ── Tests ──
  - path: "tests/testthat/test_utils.R"
    role: "test"
    description: "Unit tests for utility functions"

  # ── Data (regenerated by pipeline) ──
  - path: "data/raw/"
    role: "data-raw"
    description: "Not versioned; raw public data are regenerated by scripts"

  - path: "data/interim/"
    role: "data-interim"
    description: "Intermediate processed data"

  - path: "data/processed/"
    role: "data-processed"
    description: "Final analytic datasets and model objects"

  # ── Outputs (regenerated by pipeline) ──
  - path: "outputs/figures/"
    role: "output"
    description: "Static and interactive figures"

  - path: "outputs/tables/"
    role: "output"
    description: "CSV tables of results"

  - path: "outputs/logs/"
    role: "output"
    description: "Execution logs"

  - path: "audit/"
    role: "output"
    description: "Audit trail and quality control reports"

  - path: "reports/"
    role: "output"
    description: "Manuscript PDF and supplementary materials"
